services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: manthan
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d manthan"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      APP_VERSION: "1.0.0"
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/manthan?schema=public"
      JWT_SECRET: "change-me"
      ADMIN_EMAIL: "admin@example.com"
      ADMIN_PASSWORD: "change-me-admin-password"
      CLIENT_ORIGIN: "http://localhost:4173"
      CORS_ORIGINS: "http://localhost:4173"
      PORT: "4000"
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: "http://localhost:4000/api"
    ports:
      - "4173:4173"
    depends_on:
      - backend

volumes:
  postgres_data:
